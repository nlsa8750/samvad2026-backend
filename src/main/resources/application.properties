spring.application.name=samvad2026
server.port=${PORT:8080}

# Active profile - 'local' for dev, set SPRING_PROFILES_ACTIVE=prod on Render
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# MongoDB - local profile overrides this, Render sets MONGO_URI env var
spring.data.mongodb.uri=${MONGO_URI:}
spring.data.mongodb.database=samvad2026

# CORS
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000}

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Logging (overridden to DEBUG in local profile)
logging.level.org.springframework.data.mongodb=INFO
logging.level.com.samvad=DEBUG

# Actuator - health check for Render
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
